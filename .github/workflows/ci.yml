name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Check & GUT tests
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.5

    steps:
      - uses: actions/checkout@v4

      - name: Get latest GUT version
        id: gut_version
        run: |
          VERSION=$(wget -qO- https://api.github.com/repos/bitwes/Gut/releases/latest | grep '"tag_name"' | grep -o 'v[^"]*')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Cache GUT
        id: cache_gut
        uses: actions/cache@v4
        with:
          path: addons/gut
          key: gut-${{ steps.gut_version.outputs.version }}

      - name: Install GUT
        if: steps.cache_gut.outputs.cache-hit != 'true'
        run: |
          mkdir -p addons
          ASSET_URL=$(wget -qO- https://api.github.com/repos/bitwes/Gut/releases/latest \
            | grep -o '"browser_download_url": *"[^"]*\.zip"' \
            | head -1 \
            | grep -o 'https://[^"]*')
          wget -qO gut.zip "$ASSET_URL"
          unzip -q gut.zip -d addons/
          rm gut.zip

      - name: Import project
        run: godot4 --headless --import 2>&1 || true

      - name: Headless error check
        run: |
          godot4 --headless --quit 2>&1 | tee /tmp/check.log
          ! grep -qE "^ERROR:" /tmp/check.log

      - name: Run GUT tests
        run: godot4 --headless -s addons/gut/gut_cmdln.gd -gconfig=res://.gutconfig.json -gexit
