name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: GDScript lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache gdtoolkit
        id: cache_gdtoolkit
        uses: actions/cache@v4
        with:
          path: .venv-lint
          key: gdtoolkit-4.5.0

      - name: Install gdtoolkit
        if: steps.cache_gdtoolkit.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv-lint
          .venv-lint/bin/pip install gdtoolkit==4.5.0

      - name: Lint GDScript
        run: .venv-lint/bin/gdlint autoloads/ scenes/ test/

  test:
    name: Check & GUT tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        id: cache_godot
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/godot4
          key: godot-4.5-stable

      - name: Install Godot
        if: steps.cache_godot.outputs.cache-hit != 'true'
        run: |
          wget -qO godot.zip https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_linux.x86_64.zip
          unzip godot.zip
          mkdir -p ~/.local/bin
          mv Godot_v4.5-stable_linux.x86_64 ~/.local/bin/godot4
          chmod +x ~/.local/bin/godot4

      - name: Add Godot to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache GUT
        id: cache_gut
        uses: actions/cache@v4
        with:
          path: addons/gut
          key: gut-${{ hashFiles('scripts/install_gut.sh') }}

      - name: Install GUT
        if: steps.cache_gut.outputs.cache-hit != 'true'
        run: bash scripts/install_gut.sh

      - name: Import project
        run: godot4 --headless --import 2>&1 || true

      - name: Headless error check
        run: |
          godot4 --headless --quit 2>&1 | tee /tmp/check.log
          ! grep -qE "^ERROR:" /tmp/check.log

      - name: Run GUT tests
        run: godot4 --headless -s addons/gut/gut_cmdln.gd -gconfig=res://.gutconfig.json -gexit
